[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --no-header

[coverage:run]
source = shared, server/app
omit =
    */tests/*
    */__init__.py
    */migrations/*

[coverage:report]
show_missing = True
skip_covered = False
fail_under = 80
